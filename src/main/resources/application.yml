spring:
  application:
    name: ott-poc

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aiott}
    username: ${DB_USERNAME:aiott}
    password: ${DB_PASSWORD:aiott_pw}

  jpa:
    hibernate:
      # ddl-auto: validate   # 핵심: Flyway가 DDL 관리, Hibernate는 검증만
      ddl-auto: none

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 100
        jdbc:
          time_zone: UTC
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true


  main:
    lazy-initialization: true

  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB

logging:
  level:
    org.hibernate.SQL: info  # SQL 쿼리 로그 비활성화
    org.flywaydb: debug
    org.flywaydb.core.internal.command: debug

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://ai-ott-admin.jarneg23.workers.dev,https://ai-ott-web.jarneg23.workers.dev}
  storage:
    type: ${STORAGE_TYPE:local}      # local | r2
    upload-dir: ${UPLOAD_DIR:./data/uploads}
    hls-dir: ${HLS_DIR:./data/hls}
    temp-dir: ${TEMP_DIR:./data/tmp}
  r2:
    account-id: ${R2_ACCOUNT_ID:}
    access-key-id: ${R2_ACCESS_KEY_ID:}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:}
    bucket: ${R2_BUCKET:}
    public-url: ${R2_PUBLIC_URL:}    # e.g. https://pub-xxxxxxxx.r2.dev
  ffmpeg:
    path: ${FFMPEG_PATH:ffmpeg}
  web:
    base-url: ${WEB_BASE_URL:http://localhost:3000}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@ai-ott.com}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
    basic-price-id: ${STRIPE_BASIC_PRICE_ID:price_basic_placeholder}
    premium-price-id: ${STRIPE_PREMIUM_PRICE_ID:price_premium_placeholder}

# SendGrid SMTP 릴레이 설정 예시 (MAIL_ENABLED=true 시 활성화)
