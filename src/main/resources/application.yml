spring:
  application:
    name: ott-poc

  datasource:
    url: jdbc:postgresql://localhost:5432/aiott
    username: aiott
    password: aiott_pw

  jpa:
    hibernate:
      # ddl-auto: validate   # 핵심: Flyway가 DDL 관리, Hibernate는 검증만
      ddl-auto: none

    properties:
      hibernate:
        default_batch_fetch_size: 100
        jdbc:
          time_zone: UTC
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true


  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB

logging:
  level:
    org.hibernate.SQL: info  # SQL 쿼리 로그 비활성화
    org.flywaydb: debug
    org.flywaydb.core.internal.command: debug

app:
  video:
    original-dir: ./videos/original
    hls-dir: ./videos/hls
    thumbnail-dir: ./videos/thumbnails
  storage:
    upload-dir: ./data/uploads
    hls-dir: ./data/hls
  ffmpeg:
    path: ffmpeg

management:
  endpoints:
    web:
      exposure:
        include: flyway,mappings

security:
  jwt:
    secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET"
