spring:
  application:
    name: ott-poc

  datasource:
    url: ${DB_URL:jdbc:postgresql://dpg-d6oonotm5p6s73fju5jg-a/aiott}
    username: ${DB_USERNAME:aiott}
    password: ${DB_PASSWORD:aiott_pw}

  jpa:
    hibernate:
      # ddl-auto: validate   # 핵심: Flyway가 DDL 관리, Hibernate는 검증만
      ddl-auto: none

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 100
        jdbc:
          time_zone: UTC
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true


  main:
    lazy-initialization: true

  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB

logging:
  level:
    org.hibernate.SQL: info  # SQL 쿼리 로그 비활성화
    org.flywaydb: debug
    org.flywaydb.core.internal.command: debug

app:
  storage:
    type: ${STORAGE_TYPE:local}      # local | r2
    upload-dir: ${UPLOAD_DIR:./data/uploads}
    hls-dir: ${HLS_DIR:./data/hls}
    temp-dir: ${TEMP_DIR:./data/tmp}
  r2:
    account-id: ${R2_ACCOUNT_ID:}
    access-key-id: ${R2_ACCESS_KEY_ID:}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:}
    bucket: ${R2_BUCKET:}
    public-url: ${R2_PUBLIC_URL:}    # e.g. https://pub-xxxxxxxx.r2.dev
  ffmpeg:
    path: ${FFMPEG_PATH:ffmpeg}

management:
  endpoints:
    web:
      exposure:
        include: health,flyway,mappings
  endpoint:
    health:
      show-details: never

security:
  jwt:
    secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET"

server:
  port: ${PORT:8080}