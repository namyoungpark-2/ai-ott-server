management:
  endpoints:
    web:
      exposure:
        include: health,flyway,mappings
  endpoint:
    health:
      show-details: never

security:
  jwt:
    # 운영환경: openssl rand -base64 48 로 생성 후 JWT_SECRET 환경변수로 주입
    secret: ${JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_SECRET_32CHARS_MIN}

server:
  port: ${PORT:8080}